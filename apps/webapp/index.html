<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="script-src 'self' 'unsafe-inline'"
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#fc4c02" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="%VITE_APP_TITLE%" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_APP_TITLE%</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 100%;
        width: 100%;
        height: 100%;
        min-height: 100%;
        background:
          radial-gradient(circle at 50% 22%, rgba(148, 163, 184, 0.16), transparent 34%),
          linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      }

      #root {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
      }

      .splash-shell {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 28px;
        overflow: hidden;
      }

      .splash-card {
        width: min(320px, calc(100vw - 56px), calc(100dvh - 56px));
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        padding: 30px;
      }

      .splash-stack {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
      }

      .splash-logo {
        width: 184px;
        height: 184px;
        object-fit: contain;
        filter: drop-shadow(0 10px 22px rgba(15, 23, 42, 0.08));
      }

      .splash-bar {
        width: 100%;
        max-width: 148px;
        height: 5px;
        border-radius: 999px;
        background: rgba(203, 213, 225, 0.8);
        overflow: hidden;
      }

      .splash-bar::after {
        content: "";
        display: block;
        height: 100%;
        width: 30%;
        border-radius: 999px;
        background: #0f172a;
        animation: hub-splash-progress 1.15s ease-in-out infinite;
      }

      @keyframes hub-splash-progress {
        0% {
          transform: translateX(-100%);
        }

        100% {
          transform: translateX(390%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root" class="min-h-full min-w-full">
      <div class="splash-shell" role="status" aria-live="polite" aria-label="Loading">
        <div class="splash-card">
          <div class="splash-stack">
            <img class="splash-logo" src="/splash-icon.png" alt="Hub Core" />
            <div class="splash-bar"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
